<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Dashboard — Party Playlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1db954;
      --green-dim: #17a34a;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-dim: #888;
      --radius: 10px;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 15px; }

    .page { max-width: 640px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── Header ── */
    header { display: flex; align-items: center; gap: 12px; padding: 28px 0 24px; }
    header svg.logo { width: 36px; height: 36px; flex-shrink: 0; }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header .badge { margin-left: auto; font-size: 0.75rem; font-weight: 600;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px; color: var(--text-dim); }

    /* ── Sections ── */
    section { margin-bottom: 32px; }
    .section-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; }

    /* ── Setup card ── */
    .setup-card { text-align: center; padding: 36px 24px; }
    .setup-card .icon { font-size: 3rem; margin-bottom: 14px; }
    .setup-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .setup-card p { color: var(--text-dim); font-size: 0.88rem; line-height: 1.6; margin-bottom: 20px; }
    .setup-steps { text-align: left; background: var(--surface2); border-radius: 8px;
      padding: 16px; margin-bottom: 20px; }
    .setup-steps li { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px;
      padding-left: 4px; list-style: none; display: flex; gap: 10px; }
    .setup-steps li::before { content: attr(data-step); width: 20px; height: 20px;
      background: var(--green); color: #000; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700;
      flex-shrink: 0; }

    /* ── Alert ── */
    .alert { border-radius: 8px; padding: 12px 16px; font-size: 0.85rem; margin-bottom: 20px; }
    .alert.success { background: #0d2e1a; border: 1px solid #1db954; color: #4ade80; }
    .alert.error   { background: #2e0d0d; border: 1px solid #ef4444; color: #f87171; }
    .alert.info    { background: #0d1e2e; border: 1px solid #3b82f6; color: #93c5fd; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 8px; border: none;
      border-radius: 8px; font-size: 0.9rem; font-weight: 600; padding: 11px 18px;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--green); color: #000; }
    .btn-primary:hover:not(:disabled) { background: #22d160; }
    .btn-secondary { background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: #555; }
    .btn-sm { font-size: 0.8rem; padding: 7px 12px; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Create event form ── */
    .create-form { display: flex; gap: 10px; }
    .create-form input { flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.95rem;
      padding: 11px 14px; outline: none; transition: border-color 0.15s; }
    .create-form input:focus { border-color: var(--green); }
    .create-form input::placeholder { color: var(--text-dim); }

    /* ── Event list ── */
    .event-list { display: flex; flex-direction: column; gap: 12px; }
    .event-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; }
    .event-card-main { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }
    .event-art { width: 52px; height: 52px; border-radius: 6px; object-fit: cover;
      flex-shrink: 0; background: var(--surface2); }
    .event-art-placeholder { width: 52px; height: 52px; border-radius: 6px;
      background: var(--surface2); flex-shrink: 0; display: flex;
      align-items: center; justify-content: center; color: var(--text-dim); }
    .event-info { flex: 1; min-width: 0; }
    .event-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    .event-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 3px; }
    .event-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .event-qr-panel { display: none; border-top: 1px solid var(--border);
      padding: 20px; text-align: center; background: var(--surface2); }
    .event-qr-panel.open { display: block; }
    .event-qr-panel img { width: 200px; height: 200px; border-radius: 8px; display: block; margin: 0 auto 14px; }
    .event-qr-url { font-size: 0.8rem; color: var(--text-dim); word-break: break-all;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 12px; margin-bottom: 12px; font-family: monospace; }
    .qr-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

    /* ── Password gate ── */
    .password-gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .password-box { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; width: 100%; max-width: 360px; text-align: center; }
    .password-box .logo { width: 44px; height: 44px; margin: 0 auto 16px; }
    .password-box h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .password-box p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }
    .password-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 1rem; padding: 12px 14px;
      outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 0.1em; }
    .password-box input:focus { border-color: var(--green); }

    /* ── Spinner ── */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--green); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 36px 0; color: var(--text-dim); font-size: 0.9rem; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 24px;
      padding: 10px 20px; font-size: 0.88rem; white-space: nowrap; pointer-events: none;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
      opacity: 0; z-index: 100; }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>

<script>
const root = document.getElementById('root');
let hostPassword = sessionStorage.getItem('host_password') || '';

// ─── Entry point ──────────────────────────────────────────────────────────────
function start() {
  // Check for OAuth result in URL
  const params = new URLSearchParams(window.location.search);
  const setup = params.get('setup');
  const oauthError = params.get('error');
  // Clean the URL
  if (setup || oauthError) history.replaceState({}, '', '/host');

  if (!hostPassword) {
    renderPasswordGate(setup, oauthError);
  } else {
    renderDashboard(setup, oauthError);
  }
}

// ─── Password gate ────────────────────────────────────────────────────────────
function renderPasswordGate(setup, oauthError) {
  root.innerHTML = `
    <div class="password-gate">
      <div class="password-box">
        ${spotifyLogo(44)}
        <h2>Host Dashboard</h2>
        <p>Enter your host password to continue</p>
        ${oauthError ? `<div class="alert error">Spotify auth failed: ${escHtml(oauthError)}</div>` : ''}
        <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" />
        <button class="btn btn-primary btn-full" id="pw-btn">Sign in</button>
      </div>
    </div>`;

  const input = document.getElementById('pw-input');
  const btn = document.getElementById('pw-btn');

  input.focus();

  async function tryLogin() {
    const pw = input.value.trim();
    if (!pw) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    // Verify the password against the events list endpoint
    const res = await fetch('/api/events/list', {
      headers: { 'X-Host-Password': pw },
    });

    if (res.status === 401) {
      btn.disabled = false;
      btn.textContent = 'Sign in';
      input.style.borderColor = '#ef4444';
      input.value = '';
      input.placeholder = 'Wrong password';
      setTimeout(() => { input.style.borderColor = ''; input.placeholder = 'Password'; }, 2000);
      return;
    }

    // Good password — stash and continue
    hostPassword = pw;
    sessionStorage.setItem('host_password', pw);
    renderDashboard(setup, null);
  }

  btn.addEventListener('click', tryLogin);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
async function renderDashboard(setupFlag, oauthError) {
  root.innerHTML = `
    <div class="page">
      <header>
        ${spotifyLogo(36)}
        <h1>Host Dashboard</h1>
        <span class="badge" id="connection-badge">Checking…</span>
      </header>
      <div id="alerts"></div>
      <div id="main-content"><div class="empty-state"><span class="spinner"></span></div></div>
    </div>`;

  if (setupFlag === 'done') {
    showAlert('success', 'Spotify connected successfully! You can now create events.');
  }
  if (oauthError) {
    showAlert('error', `Spotify auth failed: ${escHtml(oauthError)}`);
  }

  await loadDashboard();
}

async function loadDashboard() {
  const content = document.getElementById('main-content');
  const badge = document.getElementById('connection-badge');

  try {
    const res = await fetch('/api/events/list', {
      headers: { 'X-Host-Password': hostPassword },
    });

    if (res.status === 401) {
      // Password expired from session or wrong — re-prompt
      sessionStorage.removeItem('host_password');
      hostPassword = '';
      renderPasswordGate(null, null);
      return;
    }

    const data = await res.json();

    if (!res.ok && data.error === 'spotify_not_connected') {
      badge.textContent = 'Not connected';
      badge.style.color = '#f87171';
      renderSetupNeeded(content);
      return;
    }

    if (!res.ok) {
      badge.textContent = 'Error';
      content.innerHTML = `<div class="alert error">${escHtml(data.error)}</div>`;
      return;
    }

    badge.textContent = 'Spotify connected';
    badge.style.color = '#4ade80';
    renderEventList(content, data.events || []);
  } catch (err) {
    badge.textContent = 'Error';
    content.innerHTML = `<div class="alert error">Failed to load: ${escHtml(err.message)}</div>`;
  }
}

// ─── Setup needed ─────────────────────────────────────────────────────────────
function renderSetupNeeded(container) {
  const redirectUri = `${window.location.origin}/api/auth/callback`;

  container.innerHTML = `
    <section>
      <div class="card" style="padding: 24px;">
        <div style="font-size:1.05rem; font-weight:700; margin-bottom:4px;">One-time Spotify setup</div>
        <div style="font-size:0.85rem; color:var(--text-dim); margin-bottom:24px;">Two quick steps — no token copying, no manual config files.</div>

        <!-- Step 1 -->
        <div style="display:flex; gap:14px; margin-bottom:20px;">
          <div style="width:28px; height:28px; border-radius:50%; background:var(--green); color:#000;
            display:flex; align-items:center; justify-content:center; font-size:0.8rem;
            font-weight:700; flex-shrink:0; margin-top:2px;">1</div>
          <div style="flex:1;">
            <div style="font-weight:600; margin-bottom:6px;">Add this Redirect URI to your Spotify app</div>
            <div style="font-size:0.82rem; color:var(--text-dim); margin-bottom:10px;">
              In the <a href="https://developer.spotify.com/dashboard" target="_blank" rel="noopener"
                style="color:var(--green); text-decoration:none;">Spotify Developer Dashboard</a>,
              open your app → Edit settings → Redirect URIs → paste this:
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
              <code style="flex:1; background:var(--surface2); border:1px solid var(--border);
                border-radius:6px; padding:9px 12px; font-size:0.8rem; word-break:break-all;
                color:var(--text);">${escHtml(redirectUri)}</code>
              <button class="btn btn-secondary btn-sm" id="copy-uri-btn" style="flex-shrink:0;">Copy</button>
            </div>
          </div>
        </div>

        <div style="border-top:1px solid var(--border); margin-bottom:20px;"></div>

        <!-- Step 2 -->
        <div style="display:flex; gap:14px; align-items:flex-start;">
          <div style="width:28px; height:28px; border-radius:50%; background:var(--green); color:#000;
            display:flex; align-items:center; justify-content:center; font-size:0.8rem;
            font-weight:700; flex-shrink:0; margin-top:2px;">2</div>
          <div style="flex:1;">
            <div style="font-weight:600; margin-bottom:6px;">Connect your Spotify account</div>
            <div style="font-size:0.82rem; color:var(--text-dim); margin-bottom:14px;">
              Authorizes this app to create playlists on your behalf. You'll be redirected back here automatically.
            </div>
            <a class="btn btn-primary" href="/api/auth/login" style="text-decoration:none;">
              ${spotifyMark(18)} Connect Spotify
            </a>
          </div>
        </div>
      </div>
    </section>`;

  document.getElementById('copy-uri-btn')?.addEventListener('click', function() {
    navigator.clipboard.writeText(redirectUri).then(() => {
      this.textContent = 'Copied!';
      setTimeout(() => { this.textContent = 'Copy'; }, 2000);
    });
  });
}
}

// ─── Event list ───────────────────────────────────────────────────────────────
function renderEventList(container, events) {
  container.innerHTML = `
    <section>
      <div class="section-title">Create new event</div>
      <div class="card" style="padding: 16px;">
        <div class="create-form">
          <input id="event-name-input" type="text" placeholder="e.g. Sarah's Birthday Party" maxlength="100" />
          <button class="btn btn-primary" id="create-btn">Create</button>
        </div>
        <div id="create-error" style="color:#f87171;font-size:0.82rem;margin-top:8px;display:none;"></div>
      </div>
    </section>

    <section>
      <div class="section-title">${events.length} event${events.length !== 1 ? 's' : ''}</div>
      <div class="event-list" id="event-list">
        ${events.length === 0
          ? `<div class="empty-state"><div class="icon">🎉</div>No events yet. Create one above!</div>`
          : events.map(renderEventCard).join('')}
      </div>
    </section>`;

  // Create event
  const nameInput = document.getElementById('event-name-input');
  const createBtn = document.getElementById('create-btn');
  const createError = document.getElementById('create-error');

  async function createEvent() {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }

    createBtn.disabled = true;
    createBtn.innerHTML = '<span class="spinner"></span>';
    createError.style.display = 'none';

    try {
      const res = await fetch('/api/events/create', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Host-Password': hostPassword,
        },
        body: JSON.stringify({ name }),
      });
      const data = await res.json();

      if (!res.ok) {
        createError.textContent = data.error || 'Failed to create event';
        createError.style.display = 'block';
        createBtn.disabled = false;
        createBtn.textContent = 'Create';
        return;
      }

      nameInput.value = '';
      createBtn.disabled = false;
      createBtn.textContent = 'Create';
      toast(`"${data.name}" created!`);

      // Prepend new event card
      const list = document.getElementById('event-list');
      const placeholder = list.querySelector('.empty-state');
      if (placeholder) list.innerHTML = '';
      list.insertAdjacentHTML('afterbegin', renderEventCard(data));
      attachQrToggle(list.firstElementChild, data);

      // Update section title
      const title = list.previousElementSibling;
      const current = parseInt(title.textContent) || 0;
      title.textContent = `${current + 1} event${current + 1 !== 1 ? 's' : ''}`;
    } catch (err) {
      createError.textContent = err.message;
      createError.style.display = 'block';
      createBtn.disabled = false;
      createBtn.textContent = 'Create';
    }
  }

  createBtn.addEventListener('click', createEvent);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') createEvent(); });

  // Attach QR toggle to existing cards
  document.querySelectorAll('.event-card').forEach(card => {
    const eventData = {
      id: card.dataset.id,
      name: card.dataset.name,
      guestUrl: card.dataset.guestUrl,
      url: card.dataset.spotifyUrl,
    };
    attachQrToggle(card, eventData);
  });
}

function renderEventCard(e) {
  return `
    <div class="event-card"
      data-id="${escHtml(e.id)}"
      data-name="${escHtml(e.name)}"
      data-guest-url="${escHtml(e.guestUrl)}"
      data-spotify-url="${escHtml(e.url || '')}">
      <div class="event-card-main">
        ${e.image
          ? `<img class="event-art" src="${escHtml(e.image)}" alt="${escHtml(e.name)}" loading="lazy" />`
          : `<div class="event-art-placeholder"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`}
        <div class="event-info">
          <div class="event-name">${escHtml(e.name)}</div>
          <div class="event-meta">${escHtml(e.guestUrl)}</div>
        </div>
        <div class="event-actions">
          <button class="btn btn-secondary btn-sm qr-toggle-btn">QR code</button>
          ${e.url ? `<a class="btn btn-secondary btn-sm" href="${escHtml(e.url)}" target="_blank" rel="noopener" style="text-decoration:none;">Spotify ↗</a>` : ''}
        </div>
      </div>
      <div class="event-qr-panel">
        <img src="/api/qr/${escHtml(e.id)}" alt="QR code for ${escHtml(e.name)}" />
        <div class="event-qr-url">${escHtml(e.guestUrl)}</div>
        <div class="qr-btns">
          <button class="btn btn-secondary btn-sm copy-url-btn">Copy link</button>
          <a class="btn btn-secondary btn-sm" href="/api/qr/${escHtml(e.id)}" download="qr-${escHtml(e.id)}.svg" style="text-decoration:none;">Download QR</a>
        </div>
      </div>
    </div>`;
}

function attachQrToggle(card, eventData) {
  const toggleBtn = card.querySelector('.qr-toggle-btn');
  const panel = card.querySelector('.event-qr-panel');
  const copyBtn = card.querySelector('.copy-url-btn');

  toggleBtn?.addEventListener('click', () => {
    const open = panel.classList.toggle('open');
    toggleBtn.textContent = open ? 'Hide QR' : 'QR code';
  });

  copyBtn?.addEventListener('click', () => {
    navigator.clipboard.writeText(eventData.guestUrl).then(() => {
      copyBtn.textContent = 'Copied!';
      setTimeout(() => { copyBtn.textContent = 'Copy link'; }, 2000);
    });
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function showAlert(type, msg) {
  const alerts = document.getElementById('alerts');
  if (!alerts) return;
  const div = document.createElement('div');
  div.className = `alert ${type}`;
  div.textContent = msg;
  alerts.appendChild(div);
  setTimeout(() => div.remove(), 6000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

function spotifyLogo(size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="24" fill="#1db954"/>
    <path d="M34.8 33.5c-.4.6-1.1.8-1.7.4-4.7-2.9-10.6-3.5-17.6-1.9-.7.2-1.3-.3-1.5-1-.2-.7.3-1.3 1-1.5 7.6-1.7 14.2-1 19.4 2.2.7.4.9 1.2.4 1.8zm2.3-5.2c-.5.7-1.4 1-2.1.5-5.4-3.3-13.6-4.3-20-2.3-.8.2-1.6-.2-1.9-1-.2-.8.2-1.6 1-1.9 7.3-2.2 16.3-1.1 22.5 2.7.7.4.9 1.3.5 2zm.2-5.4C31 19.5 21 19.2 15 21.1c-.9.3-1.9-.2-2.2-1.1-.3-.9.2-1.9 1.1-2.2 6.9-2.1 18.4-1.7 25.6 2.5.8.5 1.1 1.5.6 2.4-.5.8-1.6 1.1-2.4.6z" fill="#000"/>
  </svg>`;
}

function spotifyMark(size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 48 48" fill="none">
